        <script>
            // Get the value of the 'language' parameter from the URL
            const urlParams = new URLSearchParams(window.location.search);
            let language = urlParams.get('language');

            if (!language) {
                language = 'English';  // Default language
            }
            // If the language parameter exists, update the paragraph tag with id 'lang'
            if (language) {
                const langParagraph = document.getElementById('lang');
                if (langParagraph) {
                    if (language.includes("<script>")){
                        langParagraph.textContent = "Well done for the dom based :) FLAG{UEOWMSNFHEKW}"
                    } else {
                        langParagraph.textContent = "The language is " + language;
                    }
                    
                }
            }
            
        </script>
